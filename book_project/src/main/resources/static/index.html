<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图书管理系统 Web</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<main class="container">
    <header class="page-header">
        <h1>图书管理系统</h1>
    </header>

    <section id="authSection" class="auth-shell">
        <div class="auth-side">
            <h2>欢迎登录</h2>
            <p>请输入账号、密码与验证码</p>
        </div>
        <div class="card auth-card">
        <div class="tabs">
            <button class="tab active" data-auth-tab="login">登录</button>
            <button class="tab" data-auth-tab="register">注册</button>
            <button class="tab" data-auth-tab="forgot">忘记密码</button>
        </div>

        <form id="loginForm" class="form">
            <label>用户名 <input name="username" required></label>
            <label>密码 <input name="password" type="password" required></label>
            <label>验证码 <input name="captchaInput" required></label>
            <div class="inline">
                <span id="captchaText" class="captcha-box">----</span>
                <button type="button" id="refreshCaptchaBtn">刷新验证码</button>
            </div>
            <button type="submit">登录</button>
        </form>

        <form id="registerForm" class="form hidden">
            <label>用户名 <input name="username" required></label>
            <label>密码 <input name="password" type="password" required></label>
            <label>身份证号 <input name="id" required></label>
            <label>手机号 <input name="phone" required></label>
            <button type="submit">注册</button>
        </form>

        <form id="forgotForm" class="form hidden">
            <label>用户名 <input name="username" required></label>
            <label>身份证号 <input name="id" required></label>
            <label>手机号 <input name="phone" required></label>
            <label>新密码 <input name="newPassword" type="password" required></label>
            <button type="submit">重置密码</button>
        </form>
        </div>
    </section>

    <section id="appSection" class="hidden">
        <div class="toolbar card">
            <div>
                <strong id="currentUserText"></strong>
            </div>
            <div class="inline">
                <button id="logoutBtn" type="button">退出登录</button>
            </div>
        </div>

        <div class="grid-two">
            <section class="card">
                <h2>图书管理</h2>
                <form id="bookSearchForm" class="inline wrap">
                    <select name="mode">
                        <option value="isbn">按 ISBN</option>
                        <option value="title">按书名</option>
                        <option value="category">按分类 ID</option>
                    </select>
                    <input name="keyword" placeholder="输入关键词">
                    <button type="submit">查询</button>
                    <button type="button" id="bookSearchResetBtn">重置</button>
                </form>

                <details id="bookAddPanel">
                    <summary>新增图书（管理员）</summary>
                    <form id="bookAddForm" class="form">
                        <label>ISBN <input name="isbn" required></label>
                        <label>书名 <input name="title" required></label>
                        <label>作者 <input name="author" required></label>
                        <label>出版社 <input name="publisher" required></label>
                        <label>出版日期 <input name="publishDate" type="date" required></label>
                        <label>总藏书量 <input name="totalCount" type="number" min="0" required></label>
                        <label>可借数量 <input name="availableCount" type="number" min="0" required></label>
                        <label>分类
                            <select name="categoryId" id="bookCategorySelect"></select>
                        </label>
                        <button type="submit">保存</button>
                    </form>
                </details>

                <div class="table-wrap" id="bookTableWrap">
                    <table>
                        <thead>
                        <tr>
                            <th>ISBN</th><th>书名</th><th>作者</th><th>分类</th><th>总量</th><th>可借</th><th>操作</th>
                        </tr>
                        </thead>
                        <tbody id="bookTableBody"></tbody>
                    </table>
                </div>

                <div id="bookCategoryPanels" class="category-panels hidden"></div>
            </section>

            <section class="card">
                <h2>借阅与统计</h2>
                <div id="statsBox" class="stats"></div>
                <form id="borrowForm" class="form">
                    <label>借阅 ISBN <input name="isbn" required></label>
                    <label class="admin-only">借阅人姓名（管理员代借）<input name="borrowerName"></label>
                    <label class="admin-only">借阅人证件号（管理员代借）<input name="borrowerId"></label>
                    <button type="submit">借书</button>
                </form>
                <form id="returnForm" class="form">
                    <label>归还 ISBN <input name="isbn" required></label>
                    <label class="admin-only">借阅人证件号（管理员代还）<input name="borrowerId"></label>
                    <button type="submit">还书</button>
                </form>

                <h3>借阅记录</h3>
                <div class="table-wrap">
                    <table>
                        <thead>
                        <tr>
                            <th>借阅人</th><th>证件号</th><th>书名</th><th>借出时间</th><th>归还时间</th><th>状态</th>
                        </tr>
                        </thead>
                        <tbody id="recordTableBody"></tbody>
                    </table>
                </div>
            </section>
        </div>

        <section class="card" id="categoryManageSection">
            <h2>分类管理</h2>
            <form id="categoryForm" class="inline wrap">
                <input type="hidden" name="id">
                <input name="name" placeholder="分类名" required>
                <input name="description" placeholder="描述">
                <button type="submit">保存分类</button>
                <button type="button" id="categoryFormResetBtn">清空</button>
            </form>
            <div class="table-wrap">
                <table>
                    <thead>
                    <tr><th>ID</th><th>分类名</th><th>描述</th><th>操作</th></tr>
                    </thead>
                    <tbody id="categoryTableBody"></tbody>
                </table>
            </div>
        </section>
    </section>

    <p id="msgBox" class="msg"></p>
</main>

<script src="/app.js"></script>
</body>
</html>
